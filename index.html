<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rhythm Hero</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{background:#1c1c26;color:#e0e0e0;font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation;display:flex;justify-content:center;align-items:stretch}
@supports(height:100dvh){body{height:100dvh}}
#game-wrap{position:relative;width:100%;max-width:430px;height:100%;overflow:hidden;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui *{pointer-events:auto}
.bar-wrap{position:relative;width:70%;max-width:240px;height:10px;border:1.5px solid;border-radius:2px;overflow:hidden;background:rgba(0,0,0,.6);margin:0 auto}
.bar-fill{height:100%;transition:width .4s;border-radius:1px}
#enemy-section{position:absolute;top:13%;left:50%;transform:translateX(-50%);text-align:center;width:80%;max-width:280px;pointer-events:none}
#e-label{font:9px 'Orbitron',monospace;color:#ff336688;letter-spacing:2px;margin-bottom:2px}
#e-hp-wrap{border-color:#ff3366;margin-bottom:2px}
#e-hp-fill{background:linear-gradient(90deg,#ff3366,#cc2255);width:100%}
#e-hp-txt{font:9px 'Orbitron',monospace;color:#ff3366;text-shadow:0 0 8px #ff336666;margin-bottom:1px}
#e-atk{font:8px 'Orbitron',monospace;color:#ff336666;letter-spacing:1px}
#player-section{position:absolute;bottom:1.5%;left:50%;transform:translateX(-50%);text-align:center;width:85%;max-width:300px;pointer-events:none}
#p-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;padding:0 4px}
#p-hp-txt{font:10px 'Orbitron',monospace;color:#00ffaa;text-shadow:0 0 8px #00ffaa66}
#gold-display{font:10px 'Orbitron',monospace;color:#ffaa00;text-shadow:0 0 8px #ffaa0044}
#p-hp-wrap{border-color:#00ffaa;margin-bottom:2px}
#p-hp-fill{background:linear-gradient(90deg,#00ffaa,#00cc88);width:100%}
#p-shield-wrap{border-color:#4488ff;height:5px;margin-bottom:1px}
#p-shield-fill{background:linear-gradient(90deg,#4488ff,#2266cc);width:0%}
#p-shield-txt{font:7px 'Orbitron',monospace;color:#4488ff88}
#phase-label{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);font:26px/1 'Orbitron',monospace;font-weight:900;color:#fff;text-shadow:0 0 30px currentColor;opacity:0;transition:opacity .3s;pointer-events:none}
#hit-fb{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font:18px 'Orbitron',monospace;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s,transform .3s;text-align:center;width:90%}
#result-display{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);font:11px 'Orbitron',monospace;color:#aaa;text-align:center;pointer-events:none;white-space:nowrap}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,10,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font:32px 'Orbitron',monospace;font-weight:900;margin-bottom:14px}
.overlay p{font:16px 'Rajdhani',sans-serif;color:#888;margin-bottom:20px}
.btn{font:14px 'Orbitron',monospace;padding:12px 36px;background:0 0;border:2px solid #00ffaa;color:#00ffaa;cursor:pointer;border-radius:3px;transition:all .2s}
.btn:hover{background:#00ffaa;color:#0a0a0f}
#roll-btn:hover{background:#ffaa00;color:#0a0a0f;border-color:#ffaa00}
#start-screen{display:flex}
#start-screen h1{color:#00ffaa;text-shadow:0 0 40px #00ffaa44}
#start-screen .sub{font:18px 'Rajdhani',sans-serif;color:#556;margin-bottom:30px}
#start-screen .ctrls{font:15px 'Rajdhani',sans-serif;color:#667;margin-bottom:30px;text-align:center;line-height:2}
#start-screen .ctrls span{color:#00ffaa;font-weight:600}
#pause-btn{position:absolute;top:12px;left:12px;font-size:20px;width:40px;height:40px;background:rgba(255,255,255,0.05);border:1px solid #ffffff22;color:#ffffff88;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;line-height:1}
#pause-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<div id="ui">
  <div id="enemy-section">
    <div id="e-label">ENEMY 1</div>
    <div id="e-hp-wrap" class="bar-wrap"><div id="e-hp-fill" class="bar-fill"></div></div>
    <div id="e-hp-txt">100/100</div>
    <div id="e-atk">ATK: 50</div>
  </div>
  <div id="player-section">
    <div id="p-row">
      <div id="p-hp-txt">HP 300/300</div>
      <div id="gold-display"></div>
    </div>
    <div id="p-hp-wrap" class="bar-wrap"><div id="p-hp-fill" class="bar-fill"></div></div>
    <div id="p-shield-wrap" class="bar-wrap"><div id="p-shield-fill" class="bar-fill"></div></div>
    <div id="p-shield-txt"></div>
  </div>
  <div id="phase-label"></div>
  <div id="hit-fb"></div>
  <div id="result-display"></div>
  <button id="pause-btn">⏸</button>
  <button id="roll-btn" class="btn" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;border-color:#ffaa00;color:#ffaa00;font-size:18px;padding:16px 50px">🎲 ROLL</button>
  <div id="pause-screen" class="overlay">
    <h1 style="color:#ffaa00;text-shadow:0 0 40px #ffaa0044">PAUSED</h1>
    <p>Press ESC or tap to resume</p>
    <button class="btn" id="resume-btn">RESUME</button>
  </div>
  <div id="start-screen" class="overlay">
    <h1>RHYTHM HERO</h1>
    <p class="sub">Slot &amp; Dagger</p>
    <div class="ctrls">
      Watch the slots roll on beat<br>
      Then press <span>SPACE</span> or <span>TAP</span> at each intersection
    </div>
    <button class="btn" id="start-btn">BEGIN</button>
  </div>
  <div id="gameover-screen" class="overlay">
    <h1 id="go-title">DEFEATED</h1>
    <p id="go-sub"></p>
    <button class="btn" id="restart-btn">AGAIN</button>
  </div>
</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Audio (Web Audio API) ──
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
const ensureAC = ()=>{ if(!ac) ac = new AC(); };
const audioBuffers = {};
const ASSET_BASE = 'https://raw.githubusercontent.com/dic1405/RhyHero/main/';

function tone(f,d,v=.12,t='sine'){
  ensureAC();
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+d);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
}

async function loadAudio(name, file){
  try{
    const buf = await (await fetch(ASSET_BASE+file)).arrayBuffer();
    ensureAC();
    audioBuffers[name] = await ac.decodeAudioData(buf);
  }catch(e){ console.warn('Audio load failed:', name, e); }
}

function play(name, vol=1){
  ensureAC();
  const b = audioBuffers[name]; if(!b) return;
  const s=ac.createBufferSource(), g=ac.createGain();
  s.buffer=b; g.gain.value=vol;
  s.connect(g); g.connect(ac.destination); s.start(0);
}

function preloadAudio(){
  ensureAC();
  ['Slot','Sword','Shield','Coin','Snare'].forEach(f=>loadAudio(f.toLowerCase(), f+'.wav'));
}

const sfx = {
  slotLand(icon){ play(icon==='gold'?'coin':icon) },
  tick(){ play('snare',0.5) },
  miss(){ tone(150,.2,.1,'sawtooth') },
  enemyHit(){ tone(100,.3,.15,'sawtooth') },
  triple(){ [0,60,120,180].forEach((d,i)=>setTimeout(()=>tone(800+i*200,.12,.12),d)) },
  nextEnemy(){ tone(600,.15,.12); setTimeout(()=>tone(800,.15,.12),120); setTimeout(()=>tone(1000,.2,.1),240) },
  defeat(){ [0,150,300].forEach((d,i)=>setTimeout(()=>tone(300-i*80,.4,.12,'sawtooth'),d)) },
};

// ── PNG Icons ──
const iconImages = {};
['sword','shield'].forEach(n=>{ const i=new Image(); i.src=ASSET_BASE+'icon_'+n+'.png'; iconImages[n]=i; });
{ const i=new Image(); i.src=ASSET_BASE+'icon_coin.png'; iconImages.gold=i; }

function drawIcon(name, cx, cy, size){
  const img=iconImages[name]; if(!img||!img.complete) return;
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img, cx-size/2, cy-size/2, size, size);
  ctx.imageSmoothingEnabled=true;
}

// ── Constants ──
const BEAT = 60/85;
const PLAYER_MAX_HP = 300;
const BASE_ENEMY_HP = 100;
const BASE_ENEMY_DMG = 50;
const ICONS = ['sword','shield','gold'];
const ICON_COLORS = { sword:'#ff4466', shield:'#4488ff', gold:'#ffaa00' };

// ── State ──
let playerHP=PLAYER_MAX_HP, playerShield=0, gold=0;
let enemyMaxHP=BASE_ENEMY_HP, enemyHP=BASE_ENEMY_HP, enemyNum=1;
let currentEnemyDmg=BASE_ENEMY_DMG;

let slotIcons=[null,null,null], slotBeats=[null,null,null];
let slotPhase='idle', slotTimer=0, slotRollAnim=0;
let slotSchedule=[], slotScheduleTime=0, slotScheduleIdx=0;
let slotRevealedIcons=[false,false,false];
let slotBeatLines=[0,0,0], slotBeatFlash=[0,0,0];
let iconDotVertices=[];

let glyphVerts=[], glyphEdges=[], edgeDurs=[];
let dotSeg=0, dotProg=0, intHits=[], vertexRatings=[], totalInts=0;
let turnResults=[], phaseActive=false, showingResults=false, endPauseTimer=0;

let baseValues={sword:0,shield:0,gold:0}, tapValues={sword:0,shield:0,gold:0};
let allPerfectSoFar=true, isAllPerfect=false;

let streakCount=0, streakTextTimer=0, streakActive=false;
let particles=[], floatingAnims=[], slashAnims=[], shieldAnims=[];
let shake=0, glow=0, lastTime=0, paused=false;

const bgP=[];
for(let i=0;i<15;i++) bgP.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*5e-5,vy:(Math.random()-.5)*5e-5,r:Math.random()*2+.5,a:Math.random()*.3});

// ── Canvas ──
const gameWrap=document.getElementById('game-wrap');
const DPR=Math.min(devicePixelRatio||1,2);
function resize(){
  const w=gameWrap.clientWidth, h=gameWrap.clientHeight;
  canvas.width=w*DPR; canvas.height=h*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize); resize();
const W=()=>gameWrap.clientWidth, H=()=>gameWrap.clientHeight;

// ── Helpers ──
const rollIcon=()=>ICONS[Math.floor(Math.random()*3)];
function rollBeat(){ const r=Math.random(); return r<.4?'F':r<.75?'HH':'H'; }
const $=id=>document.getElementById(id);

function showLabel(text,color,dur=600){
  const l=$('phase-label');
  l.textContent=text; l.style.color=color;
  l.style.textShadow=`0 0 30px ${color}66`;
  l.style.opacity=1;
  setTimeout(()=>{l.style.opacity=0},dur);
}

function showFB(rating){
  const fb=$('hit-fb');
  const c={PERFECT:'#ffaa00',GREAT:'#44aaff',COOL:'#aaaa44',MISS:'#ff3366'};
  fb.textContent=rating; fb.style.color=c[rating]; fb.style.fontSize='18px';
  fb.style.textShadow='none';
  fb.style.opacity=1; fb.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(()=>{fb.style.opacity=0;fb.style.transform='translate(-50%,-50%) scale(1)'},300);
}

function updateUI(){
  $('p-hp-fill').style.width=(playerHP/PLAYER_MAX_HP*100)+'%';
  $('p-hp-txt').textContent=`HP ${playerHP}/${PLAYER_MAX_HP}`;
  $('p-shield-fill').style.width=Math.min(100,playerShield)+'%';
  $('p-shield-txt').textContent=playerShield>0?`🛡 ${playerShield}`:'';
  $('e-hp-fill').style.width=(enemyHP/enemyMaxHP*100)+'%';
  $('e-hp-txt').textContent=`${enemyHP}/${enemyMaxHP}`;
  $('gold-display').textContent=gold>0?`💰 ${gold}`:'';
}

// ── Slot Machine ──
function showRollButton(){
  $('roll-btn').style.display='block';
  $('result-display').textContent='';
  slotPhase='waiting';
  slotRevealedIcons=[false,false,false];
  slotBeatLines=[0,0,0]; slotBeatFlash=[0,0,0];
  baseValues={sword:0,shield:0,gold:0};
  tapValues={sword:0,shield:0,gold:0};
  isAllPerfect=false;
}

function startSlotPhase(){
  $('roll-btn').style.display='none';
  $('result-display').textContent='';
  slotIcons=[rollIcon(),rollIcon(),rollIcon()];
  slotBeats=[rollBeat(),rollBeat(),rollBeat()];
  slotRevealedIcons=[false,false,false];
  slotPhase='rolling'; slotRollAnim=0;
  phaseActive=false; showingResults=false;

  // Values start at 0 during roll — set after roll completes
  baseValues={sword:0,shield:0,gold:0};
  tapValues={sword:0,shield:0,gold:0};
  allPerfectSoFar=true; isAllPerfect=false;

  // Build reveal schedule
  const edges=[1]; let vp=1;
  const iconVerts=[];
  for(let i=0;i<3;i++){
    iconVerts.push(vp);
    const bt=slotBeats[i];
    if(bt==='F'){ edges.push(1); vp+=1; }
    else if(bt==='HH'){ edges.push(.5); edges.push(.5); vp+=2; }
    else { edges.push(.5); vp+=1; }
  }
  edges.pop();

  // Map HH intermediate vertices to their slot
  const vertToSlot={};
  let vc=1;
  for(let i=0;i<3;i++){
    if(slotBeats[i]==='HH') vertToSlot[vc+1]=i;
    vc+=(slotBeats[i]==='HH'?2:1);
  }

  slotSchedule=[{time:0,action:'init',slot:-1}];
  slotBeatLines=[0,0,0]; slotBeatFlash=[0,0,0];
  let t=0;
  for(let e=0;e<edges.length;e++){
    t+=edges[e]*BEAT*1000;
    const v=e+1, ii=iconVerts.indexOf(v);
    if(ii>=0) slotSchedule.push({time:t,action:'reveal',slot:ii});
    else slotSchedule.push({time:t,action:'snare',slot:vertToSlot[v]??-1});
  }
  slotScheduleTime=0; slotScheduleIdx=0;

  showLabel('🎰 ROLL','#ffaa00');
}

function updateSlots(dt){
  if(slotPhase==='idle'||slotPhase==='waiting') return;
  slotRollAnim+=dt*.006;

  if(slotPhase==='rolling'){
    slotScheduleTime+=dt;
    while(slotScheduleIdx<slotSchedule.length&&slotScheduleTime>=slotSchedule[slotScheduleIdx].time){
      const ev=slotSchedule[slotScheduleIdx];
      if(ev.action==='reveal'){
        slotRevealedIcons[ev.slot]=true;
        sfx.slotLand(slotIcons[ev.slot]);
        slotBeatLines[ev.slot]=1; slotBeatFlash[ev.slot]=300;
      } else if(ev.action==='init'){ play('slot');
      } else if(ev.action==='snare'){
        sfx.tick();
        if(ev.slot>=0){ slotBeatLines[ev.slot]=2; slotBeatFlash[ev.slot]=300; }
      }
      slotScheduleIdx++;
    }
    for(let i=0;i<3;i++) if(slotBeatFlash[i]>0) slotBeatFlash[i]-=dt;
    if(slotScheduleIdx>=slotSchedule.length){
      slotPhase='show-result'; slotTimer=BEAT*800;
      if(slotIcons[0]===slotIcons[1]&&slotIcons[1]===slotIcons[2]) sfx.triple();
    }
  } else if(slotPhase==='show-result'){
    slotTimer-=dt;
    for(let i=0;i<3;i++) if(slotBeatFlash[i]>0) slotBeatFlash[i]-=dt;
    if(slotTimer<=0) startGlyphPhase();
  }
}

// ── Glyph Building ──
function buildRhythmFromSlots(){
  const edges=[1]; // init edge
  iconDotVertices=[]; let vp=1;
  for(let i=0;i<3;i++){
    iconDotVertices.push(vp);
    const bt=slotBeats[i];
    if(bt==='F'){ edges.push(1); vp+=1; }
    else if(bt==='HH'){ edges.push(.5); edges.push(.5); vp+=2; }
    else { edges.push(.5); vp+=1; }
  }
  edges.pop();
  return edges;
}

function buildGlyph(edgeMults, cx, cy){
  const n=edgeMults.length;
  const shapeType=Math.floor(Math.random()*6);
  const baseAngle=Math.PI/3;
  const gameEdges=n-1; // edges after init
  const gameW=edgeMults.slice(1).reduce((a,b)=>a+b,0);
  const maxW=W()-80;
  const estH=gameW*Math.cos(baseAngle)*(shapeType===2?.6:1);
  const unitLen=Math.min(96, estH>0?maxW/estH:96);

  // Compute edge angles — edge 0 is init (vertical down), rest zigzag horizontally
  const angles=[];
  for(let i=0;i<n;i++){
    if(i===0){ angles.push(Math.PI/2); continue; } // init: straight down
    const zi=i-1; // zigzag index starts at 0 from first game edge
    let a;
    if(shapeType===0) a=(zi%2===0)?baseAngle:-baseAngle;
    else if(shapeType===1) a=(zi%2===0)?-baseAngle:baseAngle;
    else if(shapeType===2){
      const half=Math.floor(gameEdges/2), right=zi<half;
      const d=(zi%2===0)?1:-1, h=right?1:-1;
      a=Math.atan2(Math.sin(baseAngle)*d,Math.cos(baseAngle)*h);
    }
    else if(shapeType===3){
      const steep=zi%2===0, ang=steep?Math.PI/2.2:Math.PI/5;
      a=ang*((Math.floor(zi/2)%2===0)?1:-1);
    }
    else if(shapeType===4) a=(Math.PI/2.5)*((zi%2===0)?1:-1);
    else{
      const phase=(zi/Math.max(1,gameEdges-1))*Math.PI*2;
      a=baseAngle*Math.sin(phase);
    }
    angles.push(a);
  }

  // Place vertices
  const verts=[]; let x=0,y=0; verts.push({x,y});
  for(let i=0;i<n;i++){
    const len=edgeMults[i]*unitLen, a=angles[i];
    x+=len*Math.cos(a); y+=len*Math.sin(a);
    verts.push({x,y});
  }

  // Center
  const xs=verts.map(v=>v.x), ys=verts.map(v=>v.y);
  const ox=cx-(Math.min(...xs)+Math.max(...xs))/2;
  const oy=cy-(Math.min(...ys)+Math.max(...ys))/2;
  verts.forEach(v=>{v.x+=ox;v.y+=oy});

  const edges=[], durs=[];
  for(let i=0;i<n;i++){
    edges.push({from:i,to:i+1,beatMult:edgeMults[i]});
    durs.push(edgeMults[i]*BEAT);
  }
  return {verts,edges,durs};
}

function startGlyphPhase(){
  slotPhase='playing';
  const em=buildRhythmFromSlots();
  const g=buildGlyph(em, W()/2, H()*0.53);
  glyphVerts=g.verts; glyphEdges=g.edges; edgeDurs=g.durs;
  totalInts=g.verts.length;
  dotSeg=0; dotProg=0; endPauseTimer=0;
  intHits=new Array(totalInts).fill(false);
  vertexRatings=new Array(totalInts).fill(null);
  intHits[0]=true;
  turnResults=[]; phaseActive=true;
  tapValues={sword:0,shield:0,gold:0};
  allPerfectSoFar=true; isAllPerfect=false;

  // Set base values now — indicators jump from 0 to base on init beat
  baseValues={sword:0,shield:0,gold:0};
  const triple=slotIcons[0]===slotIcons[1]&&slotIcons[1]===slotIcons[2];
  if(triple){
    const ic=slotIcons[0];
    baseValues[ic]=ic==='gold'?6:60;
  } else {
    slotIcons.forEach(ic=>{ baseValues[ic]+=(ic==='gold'?1:10); });
  }

  play('slot');
}

// ── Hit Detection ──
function getDotPos(){
  const e=glyphEdges[dotSeg], f=glyphVerts[e.from], t=glyphVerts[e.to];
  return {x:f.x+(t.x-f.x)*dotProg, y:f.y+(t.y-f.y)*dotProg};
}

function evalHit(){
  // During end pause: dot is at last vertex, check timing since arrival
  if(endPauseTimer>0){
    const sinceArrival=BEAT*1000-endPauseTimer;
    const lastV=glyphEdges[glyphEdges.length-1].to;
    if(!intHits[lastV]){
      if(sinceArrival<55) return {rating:'PERFECT',nearEnd:true,forceIdx:lastV};
      if(sinceArrival<120) return {rating:'GREAT',nearEnd:true,forceIdx:lastV};
      if(sinceArrival<200) return {rating:'COOL',nearEnd:true,forceIdx:lastV};
    }
    return {rating:'MISS',nearEnd:true};
  }
  const ms=edgeDurs[dotSeg]*1000;
  const tEnd=(1-dotProg)*ms, tStart=dotProg*ms;
  const near=tEnd<tStart, td=Math.min(tEnd,tStart);
  if(td<55) return {rating:'PERFECT',nearEnd:near};
  if(td<120) return {rating:'GREAT',nearEnd:near};
  if(td<200) return {rating:'COOL',nearEnd:near};
  return {rating:'MISS',nearEnd:near};
}

function handleHit(){
  if(!phaseActive||showingResults) return;
  const r=evalHit();
  if(r.rating!=='MISS'){
    const idx=r.forceIdx||(r.nearEnd?glyphEdges[dotSeg].to:glyphEdges[dotSeg].from);
    if(idx===0) return;
    if(!intHits[idx]){
      intHits[idx]=true; vertexRatings[idx]=r.rating; turnResults.push(r.rating);
      showFB(r.rating);
      spawnParticles(glyphVerts[idx].x,glyphVerts[idx].y,r.rating);
      applyTap(idx,r.rating);
      if(r.rating!=='PERFECT') allPerfectSoFar=false;
    }
  } else {
    const idx=r.forceIdx||(r.nearEnd?glyphEdges[dotSeg].to:glyphEdges[dotSeg].from);
    if(idx>0&&!intHits[idx]){
      intHits[idx]=true; vertexRatings[idx]='MISS'; turnResults.push('MISS');
      allPerfectSoFar=false;
      showFB('MISS'); sfx.miss();
    }
  }
}

function applyTap(vi, rating){
  const vx=glyphVerts[vi].x, vy=glyphVerts[vi].y;
  const ii=iconDotVertices.indexOf(vi);
  const vol={PERFECT:1.6,GREAT:1.0,COOL:0.3}[rating]||1;

  if(ii>=0){
    const icon=slotIcons[ii];
    const b={sword:{PERFECT:20,GREAT:15,COOL:12},shield:{PERFECT:15,GREAT:12,COOL:11},gold:{PERFECT:5,GREAT:2,COOL:1}};
    const val=b[icon][rating]; tapValues[icon]+=val;
    if(icon==='sword'){ enemyHP=Math.max(0,enemyHP-val); shake=Math.min(val/3,6); updateUI(); slashAnims.push({life:1,x:W()/2,y:H()*.08}); play('sword',vol); }
    else if(icon==='shield'){ playerShield+=val; updateUI(); shieldAnims.push({life:1,x:W()/2,y:H()*.80}); play('shield',vol); }
    else { gold+=val; updateUI(); spawnCoins(vx,vy,rating); play('coin',vol); }
  } else if(vi>0){
    const ab={PERFECT:5,GREAT:2,COOL:1}[rating];
    if(baseValues.sword>0){ tapValues.sword+=ab; enemyHP=Math.max(0,enemyHP-ab); shake=Math.min(ab/3,4); slashAnims.push({life:1,x:W()/2,y:H()*.08}); }
    if(baseValues.shield>0){ tapValues.shield+=ab; playerShield+=ab; shieldAnims.push({life:1,x:W()/2,y:H()*.80}); }
    if(baseValues.gold>0){ tapValues.gold+=ab; gold+=ab; spawnCoins(vx,vy,rating); }
    updateUI(); play('snare',vol*0.5);
  }
}

function spawnCoins(x,y,rating){
  const n=rating==='PERFECT'?3:rating==='GREAT'?2:1;
  for(let i=0;i<n;i++) floatingAnims.push({type:'coin',x:x+(Math.random()-.5)*20,y,vx:(Math.random()-.5)*2,vy:-3-Math.random()*2,life:1,size:14+Math.random()*4});
}

function spawnParticles(x,y,rating){
  const c={PERFECT:'#ffaa00',GREAT:'#44aaff',COOL:'#aaaa44',MISS:'#ff3366'};
  const n=rating==='PERFECT'?9:rating==='GREAT'?6:3;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.015+Math.random()*.015,color:c[rating],size:Math.random()*4+2});
  }
}

// ── Finish / Streak ──
// Opacity table: [glyphAlpha, circleBase, timingLo, timingHi]
const STREAK_OPACITY = [
  [1.00, 1.00, 1.00, 1.00], // streak 0
  [0.66, 0.75, 0.70, 0.90], // streak 1
  [0.33, 0.40, 0.50, 0.70], // streak 2
  [0.10, 0.15, 0.22, 0.30], // streak 3
  [0.00, 0.05, 0.10, 0.15], // streak 4
  [0.00, 0.00, 0.05, 0.10], // streak 5+
];
function getStreakOpacity(){
  const i=Math.min(streakCount, STREAK_OPACITY.length-1);
  return STREAK_OPACITY[i];
}

function finishPlaying(){
  phaseActive=false; showingResults=true;
  const tappable=totalInts-1;
  if(turnResults.filter(r=>r!=='MISS').length<tappable) allPerfectSoFar=false;
  isAllPerfect=allPerfectSoFar;

  if(enemyHP<=0){ streakCount=0; setTimeout(()=>advanceEnemy(),1200); return; }

  if(isAllPerfect){
    streakCount++; streakActive=true; streakTextTimer=BEAT*1000;
    sfx.triple();
    const fb=$('hit-fb');
    fb.textContent=`✨ Perfect Streak ${streakCount}!`;
    fb.style.color='#ffaa00'; fb.style.fontSize='14px';
    fb.style.textShadow='none';
    fb.style.opacity=1; fb.style.transform='translate(-50%,-50%) scale(1.3)';
  } else {
    streakCount=0;
    setTimeout(()=>{ showingResults=false; $('result-display').textContent=''; enemyTurn(); },800);
  }
}

function updateStreak(dt){
  if(!streakActive) return;
  streakTextTimer-=dt;
  if(streakTextTimer<=0){ streakActive=false; showingResults=false; $('hit-fb').style.opacity=0; startSlotPhase(); }
}

// ── Enemy Turn ──
let enemyTurnPhase='', enemyTurnTimer=0, enemyTurnActive=false;
let enemyTurnAbsorbed=0, enemyTurnDmg=0;

function enemyTurn(){
  showingResults=false; slotPhase='enemy-turn';
  $('result-display').textContent='';
  enemyTurnDmg=currentEnemyDmg; enemyTurnAbsorbed=0;
  if(playerShield>0){ enemyTurnAbsorbed=Math.min(playerShield,enemyTurnDmg); enemyTurnDmg-=enemyTurnAbsorbed; }
  enemyTurnPhase='attack'; enemyTurnTimer=BEAT*1000; enemyTurnActive=true;
  sfx.enemyHit();
}

function updateEnemyTurn(dt){
  if(!enemyTurnActive) return;
  enemyTurnTimer-=dt; if(enemyTurnTimer>0) return;
  if(enemyTurnPhase==='attack'){
    enemyTurnPhase='react'; enemyTurnTimer=BEAT*1000;
    if(enemyTurnAbsorbed>0) playerShield-=enemyTurnAbsorbed;
    if(enemyTurnDmg>0){ playerHP=Math.max(0,playerHP-enemyTurnDmg); shake=6; }
    sfx.enemyHit(); updateUI();
  } else {
    enemyTurnActive=false;
    if(playerHP<=0){ setTimeout(()=>endGame(),600); return; }
    setTimeout(()=>showRollButton(),300);
  }
}

function drawEnemyTurn(){
  if(!enemyTurnActive) return;
  const cx=W()/2, cy=H()/2;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,cy-50,W(),100);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  if(enemyTurnPhase==='attack'){
    drawIcon('sword',cx,cy-8,36);
    ctx.font='18px Orbitron'; ctx.fillStyle='#ff3366';
    ctx.fillText(`ATK ${currentEnemyDmg}`,cx,cy+30);
  } else {
    if(enemyTurnAbsorbed>0&&enemyTurnDmg>0){
      drawIcon('shield',cx-16,cy-8,28);
      ctx.font='15px Orbitron'; ctx.fillStyle='#ff6666';
      ctx.fillText(`Shield -${enemyTurnAbsorbed}  HP -${enemyTurnDmg}`,cx,cy+30);
    } else if(enemyTurnAbsorbed>0){
      drawIcon('shield',cx,cy-8,36);
      ctx.font='16px Orbitron'; ctx.fillStyle='#4488ff';
      ctx.fillText(`Shield absorbed ${enemyTurnAbsorbed}!`,cx,cy+30);
    } else {
      ctx.font='28px serif'; ctx.fillStyle='#fff'; ctx.fillText('💔',cx,cy-8);
      ctx.font='16px Orbitron'; ctx.fillStyle='#ff3366';
      ctx.fillText(`-${enemyTurnDmg} HP`,cx,cy+30);
    }
    const fl=Math.sin(glow*15)*.3+.7;
    ctx.globalAlpha=fl*.15; ctx.fillStyle='#ff3366';
    ctx.beginPath(); ctx.arc(cx,cy,40,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ── Drawing ──
function drawBG(){
  ctx.fillStyle='#1c1c26'; ctx.fillRect(0,0,W(),H());
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
    ctx.beginPath();ctx.arc(p.x*W(),p.y*H(),p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,140,180,${p.a})`;ctx.fill();
  });
}

function drawSlots(){
  if(slotPhase==='idle') return;
  const cx=W()/2, sy=H()*.28, sw=56, sh=64, gap=10;
  const sx=cx-(sw*3+gap*2)/2;

  for(let i=0;i<3;i++){
    const x=sx+i*(sw+gap), y=sy-sh/2, rev=slotRevealedIcons[i];
    ctx.strokeStyle=rev?'#cccccc':'#ffffff22';
    ctx.lineWidth=rev?2:1; ctx.strokeRect(x,y,sw,sh);
    ctx.fillStyle=rev?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.3)'; ctx.fillRect(x,y,sw,sh);
    if(rev) drawIcon(slotIcons[i],x+sw/2,y+sh/2,28);
    else if(slotPhase==='rolling'&&!rev){
      ctx.globalAlpha=.4; drawIcon(ICONS[Math.floor(slotRollAnim*8)%3],x+sw/2,y+sh/2,28); ctx.globalAlpha=1;
    }
  }

  // Beat indicators
  const by=sy+sh/2+8, lh=3, lp=4;
  for(let i=0;i<3;i++){
    if(slotBeatLines[i]<=0) continue;
    const x=sx+i*(sw+gap), bt=slotBeats[i];
    const fl=slotBeatFlash[i]>0?.5+(slotBeatFlash[i]/300)*.5:.3;
    if(bt==='F'){ ctx.fillStyle=`rgba(255,255,255,${fl})`; ctx.fillRect(x,by,sw,lh); }
    else if(bt==='HH'){
      const hw=(sw-lp)/2;
      if(slotBeatLines[i]>=1){ const f1=slotBeatLines[i]===1&&slotBeatFlash[i]>0?.5+(slotBeatFlash[i]/300)*.5:.3; ctx.fillStyle=`rgba(255,255,255,${f1})`; ctx.fillRect(x,by,hw,lh); }
      if(slotBeatLines[i]>=2){ const f2=slotBeatFlash[i]>0?.5+(slotBeatFlash[i]/300)*.5:.3; ctx.fillStyle=`rgba(255,255,255,${f2})`; ctx.fillRect(x+hw+lp,by,hw,lh); }
    } else { const hw=(sw-lp)/2; ctx.fillStyle=`rgba(255,255,255,${fl})`; ctx.fillRect(x+(sw-hw)/2,by,hw,lh); }
  }
}

function drawIndicators(){
  if(slotPhase==='idle') return;
  const cx=W()/2, y=H()*.73;
  const names=['sword','shield','gold'];
  const gap=Math.min(140,W()*.35), sx=cx-gap;

  names.forEach((n,i)=>{
    const x=sx+i*gap, bv=baseValues[n], tv=tapValues[n], has=bv>0||tv>0;
    ctx.globalAlpha=has?1:.3; drawIcon(n,x-45,y,22);
    ctx.font='16px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=has?ICON_COLORS[n]+'cc':'#ffffff22'; ctx.fillText(`${bv}`,x-28,y);
    ctx.font='14px Orbitron'; ctx.fillStyle=tv>0?'#00ffaacc':'#ffffff22'; ctx.fillText(`+${tv}`,x+2,y);
    ctx.globalAlpha=1;
  });
}

function drawGlyph(){
  if(slotPhase!=='playing'||(!phaseActive&&!showingResults)) return;
  const so=getStreakOpacity(); // [glyphA, circleBase, timingLo, timingHi]
  const col='#00ffaa', dim='rgba(0,255,170,0.15)', mid='rgba(0,255,170,0.4)';
  const maxR=12, minR=7.5, animW=BEAT*1000;

  // Edges — traversed edges at 100%, ahead edges at streak opacity
  glyphEdges.forEach((e,ei)=>{
    const f=glyphVerts[e.from],t=glyphVerts[e.to];
    const isInit=ei===0;
    const rating=vertexRatings[e.to];
    const traversed=rating!==null; // vertex has been resolved (tapped or missed)

    // Traversed edges show at 100% opacity, ahead edges at streak opacity
    ctx.globalAlpha=traversed?1:so[0];

    // Background glow line — PERFECT gets thicker glow too
    const isPerfect=rating==='PERFECT';
    if(rating==='MISS') ctx.strokeStyle='rgba(255,51,102,0.15)';
    else if(isPerfect) ctx.strokeStyle='rgba(255,170,0,0.3)';
    else if(rating==='GREAT'||rating==='COOL') ctx.strokeStyle='rgba(0,255,170,0.2)';
    else ctx.strokeStyle=isInit?'rgba(255,255,255,0.04)':dim;
    ctx.lineWidth=isInit?4:isPerfect?10:6;
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();

    // Center line
    if(!isInit||rating){
      let lc=mid, lw=e.beatMult<=.5?0.75:1.5;
      if(rating==='MISS') lc='rgba(255,51,102,0.6)';
      else if(isPerfect){ lc='rgba(255,170,0,0.9)'; lw=e.beatMult<=.5?2:4; }
      else if(rating==='GREAT'||rating==='COOL'){ lc='rgba(0,255,170,0.6)'; lw*=1.25; }
      ctx.strokeStyle=lc; ctx.lineWidth=lw;
      ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();
    }
  });

  // Vertices — circle opacity with timing ramp
  glyphVerts.forEach((v,i)=>{
    const hit=intHits[i], isInit=i===0;
    let td=Infinity;
    if(phaseActive&&!hit&&!isInit&&dotSeg<glyphEdges.length){
      if(i===glyphEdges[dotSeg].from) td=dotProg*edgeDurs[dotSeg]*1000;
      else if(i===glyphEdges[dotSeg].to) td=(1-dotProg)*edgeDurs[dotSeg]*1000;
      else if(dotSeg+1<glyphEdges.length&&i===glyphEdges[dotSeg+1].to)
        td=(1-dotProg)*edgeDurs[dotSeg]*1000+edgeDurs[dotSeg+1]*1000;
    }
    let r=td<=animW&&td!==Infinity?minR+(maxR-minR)*Math.max(0,td/animW):hit?maxR*.8:maxR;

    // Circle opacity: ramp from circleBase to timingHi as dot approaches
    let circleA=so[1]; // base circle opacity
    if(td<200&&td!==Infinity){
      // Within timing window: ramp from timingLo (at 200ms) to timingHi (at 0ms)
      const t=1-td/200; // 0 at 200ms, 1 at 0ms
      circleA=so[2]+(so[3]-so[2])*t;
    }
    ctx.globalAlpha=Math.min(1,circleA);

    ctx.beginPath();ctx.arc(v.x,v.y,r+4,0,Math.PI*2);
    ctx.fillStyle=hit?'rgba(255,255,255,0.08)':col+'11';ctx.fill();
    ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);
    if(isInit){ ctx.strokeStyle='#ffffff33';ctx.lineWidth=1; }
    else{
      const prox=td<=animW?1-td/animW:0;
      ctx.strokeStyle=hit?'#ffffff44':prox>.5?'#ffffffee':prox>0?'#ffffffbb':col;
      ctx.lineWidth=hit?1.5:1.5+prox*1.5;
    }
    ctx.stroke();

    if(isInit){
      ctx.font='10px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#00ffaa88';ctx.fillText('PLAY',v.x,v.y);
    } else if(hit){
      // Outer filled ring
      ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      // Inner filled dot
      ctx.beginPath();ctx.arc(v.x,v.y,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
    }
  });

  // Dot — glyph opacity
  if(phaseActive){
    ctx.globalAlpha=so[0];
    const p=getDotPos();
    ctx.beginPath();ctx.arc(p.x,p.y,16,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,170,0.15)';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,7.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawEnemy(){

  ctx.beginPath();ctx.arc(8,-6,4,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.arc(-8,-6,1.5,0,Math.PI*2);ctx.fill();

function drawPlayer(){
  const cx=W()/2,cy=H()*.80,p=Math.sin(glow*2.5)*2;
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,0,25,0,Math.PI*2);ctx.fillStyle='rgba(0,255,170,.06)';ctx.fill();
  ctx.strokeStyle='#00ffaa88';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,-12,8+p*.3,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(0,10);ctx.moveTo(-10,2);ctx.lineTo(10,2);ctx.moveTo(0,10);ctx.lineTo(-8,20);ctx.moveTo(0,10);ctx.lineTo(8,20);ctx.stroke();
  ctx.restore();

function updateAnims(dt){
  const decay=dt/800;
  floatingAnims=floatingAnims.filter(a=>a.life>0);
  floatingAnims.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.vy+=.08;a.life-=decay;});
  slashAnims=slashAnims.filter(a=>a.life>0);
  slashAnims.forEach(a=>{a.life-=dt/300;});
  shieldAnims=shieldAnims.filter(a=>a.life>0);
  shieldAnims.forEach(a=>{a.life-=dt/500;});
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=p.decay;});
}

function drawAnims(){
  floatingAnims.forEach(a=>{ctx.globalAlpha=Math.max(0,a.life);drawIcon('gold',a.x,a.y,a.size);ctx.globalAlpha=1;});
  slashAnims.forEach(a=>{
    const t=1-a.life,len=25+t*15;
    ctx.save();ctx.translate(a.x,a.y);ctx.globalAlpha=Math.max(0,a.life);
    ctx.strokeStyle='#ff4466';ctx.lineWidth=3*a.life;
    ctx.beginPath();ctx.moveTo(-len,-len*.6);ctx.lineTo(len,len*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(len*.8,-len*.5);ctx.lineTo(-len*.8,len*.5);ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  });
  shieldAnims.forEach(a=>{
    const sy=a.y-(1-a.life)*30;
    ctx.globalAlpha=Math.max(0,a.life);drawIcon('shield',a.x,sy,24);ctx.globalAlpha=1;
  });
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.size*p.life),0,Math.PI*2);
    const a=Math.max(0,Math.min(255,Math.floor(p.life*255)));
    ctx.fillStyle=p.color+a.toString(16).padStart(2,'0');ctx.fill();
  });
}

// ── Main Loop ──
function update(ts){
  const dt=ts-lastTime; lastTime=ts; glow+=dt*.001;

  if(!paused){
    updateSlots(dt);

    if(phaseActive&&edgeDurs.length>0&&endPauseTimer<=0){
      dotProg+=(1/edgeDurs[dotSeg])*(dt/1000);
      if(dotProg>=1){
        dotProg-=1; dotSeg++;
        // Don't mark untapped vertex as MISS yet — grace period for late taps
        // Sound only plays for already-tapped vertices (confirmation)
        if(intHits[dotSeg]){
          // Already tapped — no action needed
        }
        if(dotSeg>=glyphEdges.length){ dotSeg=glyphEdges.length-1; dotProg=1; endPauseTimer=BEAT*1000; }
      }

      // Grace period check: mark vertex as MISS if dot passed it 200ms+ ago
      if(dotSeg<glyphEdges.length){
        const fromV=glyphEdges[dotSeg].from;
        const msSinceCross=dotProg*edgeDurs[dotSeg]*1000;
        if(fromV>0&&!intHits[fromV]&&msSinceCross>200){
          intHits[fromV]=true; vertexRatings[fromV]='MISS';
          turnResults.push('MISS'); allPerfectSoFar=false;
          const ii=iconDotVertices.indexOf(fromV);
          if(ii>=0) sfx.slotLand(slotIcons[ii]); else sfx.tick();
        }
      }
    }

    if(endPauseTimer>0){
      endPauseTimer-=dt;
      // Grace period for last vertex
      const lastV=glyphEdges[glyphEdges.length-1].to;
      if(!intHits[lastV]&&endPauseTimer<(BEAT*1000-200)){
        intHits[lastV]=true; vertexRatings[lastV]='MISS';
        turnResults.push('MISS'); allPerfectSoFar=false;
        const ii=iconDotVertices.indexOf(lastV);
        if(ii>=0) sfx.slotLand(slotIcons[ii]); else sfx.tick();
      }
      if(endPauseTimer<=0) finishPlaying();
    }

    updateAnims(dt);
    updateStreak(dt);
    updateEnemyTurn(dt);
    shake*=.9; if(shake<.1) shake=0;
  }

  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  drawBG(); drawEnemy(); drawPlayer(); drawSlots(); drawIndicators(); drawGlyph();
  ctx.restore();
  drawAnims(); drawEnemyTurn();
  requestAnimationFrame(update);
}
requestAnimationFrame(update);
</script>
</body>
</html>
