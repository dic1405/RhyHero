<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Glyph Dungeon — Slot & Dagger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation;display:flex;justify-content:center;align-items:stretch}
@supports(height:100dvh){body{height:100dvh}}
#game-wrap{position:relative;width:100%;max-width:430px;height:100%;overflow:hidden;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui *{pointer-events:auto}
.bar-wrap{position:relative;width:70%;max-width:240px;height:10px;border:1.5px solid;border-radius:2px;overflow:hidden;background:rgba(0,0,0,.6);margin:0 auto}
.bar-fill{height:100%;transition:width .4s;border-radius:1px}

/* Enemy section */
#enemy-section{position:absolute;top:13%;left:50%;transform:translateX(-50%);text-align:center;width:80%;max-width:280px;pointer-events:none}
#e-label{font:9px 'Orbitron',monospace;color:#ff336688;letter-spacing:2px;margin-bottom:2px}
#e-hp-wrap{border-color:#ff3366;margin-bottom:2px}
#e-hp-fill{background:linear-gradient(90deg,#ff3366,#cc2255);width:100%}
#e-hp-txt{font:9px 'Orbitron',monospace;color:#ff3366;text-shadow:0 0 8px #ff336666;margin-bottom:1px}
#e-atk{font:8px 'Orbitron',monospace;color:#ff336666;letter-spacing:1px}

/* Player section */
#player-section{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);text-align:center;width:85%;max-width:300px;pointer-events:none}
#p-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;padding:0 4px}
#p-hp-txt{font:10px 'Orbitron',monospace;color:#00ffaa;text-shadow:0 0 8px #00ffaa66}
#gold-display{font:10px 'Orbitron',monospace;color:#ffaa00;text-shadow:0 0 8px #ffaa0044}
#p-hp-wrap{border-color:#00ffaa;margin-bottom:2px}
#p-hp-fill{background:linear-gradient(90deg,#00ffaa,#00cc88);width:100%}
#p-shield-wrap{border-color:#4488ff;height:5px;margin-bottom:1px}
#p-shield-fill{background:linear-gradient(90deg,#4488ff,#2266cc);width:0%}
#p-shield-txt{font:7px 'Orbitron',monospace;color:#4488ff88}
#phase-label{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);font:26px/1 'Orbitron',monospace;font-weight:900;color:#fff;text-shadow:0 0 30px currentColor;opacity:0;transition:opacity .3s;pointer-events:none}
#hit-fb{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font:18px 'Orbitron',monospace;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s,transform .3s}
#result-display{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);font:11px 'Orbitron',monospace;color:#aaa;text-align:center;pointer-events:none;white-space:nowrap}
#info{position:absolute;top:27%;left:50%;transform:translateX(-50%);font:10px 'Orbitron',monospace;color:#666;text-align:center;pointer-events:none}
#instructions{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);font:11px 'Rajdhani',sans-serif;color:#555;text-align:center;pointer-events:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,10,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font:32px 'Orbitron',monospace;font-weight:900;margin-bottom:14px}
.overlay p{font:16px 'Rajdhani',sans-serif;color:#888;margin-bottom:20px}
.btn{font:14px 'Orbitron',monospace;padding:12px 36px;background:0 0;border:2px solid #00ffaa;color:#00ffaa;cursor:pointer;border-radius:3px;transition:all .2s}
.btn:hover{background:#00ffaa;color:#0a0a0f}
#roll-btn:hover{background:#ffaa00;color:#0a0a0f;border-color:#ffaa00}
#start-screen{display:flex}
#start-screen h1{color:#00ffaa;text-shadow:0 0 40px #00ffaa44}
#start-screen .sub{font:18px 'Rajdhani',sans-serif;color:#556;margin-bottom:30px}
#start-screen .ctrls{font:15px 'Rajdhani',sans-serif;color:#667;margin-bottom:30px;text-align:center;line-height:2}
#start-screen .ctrls span{color:#00ffaa;font-weight:600}
#pause-btn{position:absolute;top:12px;left:12px;font-size:20px;width:40px;height:40px;background:rgba(255,255,255,0.05);border:1px solid #ffffff22;color:#ffffff88;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;line-height:1}
#pause-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<div id="ui">
  <!-- Enemy section — centered below enemy sprite -->
  <div id="enemy-section">
    <div id="e-label">ENEMY 1</div>
    <div id="e-hp-wrap" class="bar-wrap"><div id="e-hp-fill" class="bar-fill"></div></div>
    <div id="e-hp-txt">300/300</div>
    <div id="e-atk">ATK: 30</div>
  </div>

  <!-- Player section — centered below player sprite -->
  <div id="player-section">
    <div id="p-row">
      <div id="p-hp-txt">PLAYER 300/300</div>
      <div id="gold-display">💰 0</div>
    </div>
    <div id="p-hp-wrap" class="bar-wrap"><div id="p-hp-fill" class="bar-fill"></div></div>
    <div id="p-shield-wrap" class="bar-wrap"><div id="p-shield-fill" class="bar-fill"></div></div>
    <div id="p-shield-txt"></div>
  </div>

  <div id="phase-label"></div>
  <div id="hit-fb"></div>
  <div id="info"></div>
  <div id="result-display"></div>
  <div id="instructions"></div>

  <button id="pause-btn">⏸</button>
  <button id="roll-btn" class="btn" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;border-color:#ffaa00;color:#ffaa00;font-size:18px;padding:16px 50px">🎲 ROLL</button>

  <div id="pause-screen" class="overlay">
    <h1 style="color:#ffaa00;text-shadow:0 0 40px #ffaa0044">PAUSED</h1>
    <p>Press ESC or tap to resume</p>
    <button class="btn" id="resume-btn">RESUME</button>
  </div>

  <div id="start-screen" class="overlay">
    <h1>GLYPH DUNGEON</h1>
    <p class="sub">Slot &amp; Dagger</p>
    <div class="ctrls">
      Watch the slots roll on beat<br>
      Then press <span>SPACE</span> or <span>TAP</span> at each intersection<br>
      ⚔ Sword = damage &nbsp; 🛡 Shield = block &nbsp; 💰 Gold = riches<br>
      Triple match = massive bonus!
    </div>
    <button class="btn" id="start-btn">BEGIN</button>
  </div>

  <div id="gameover-screen" class="overlay">
    <h1 id="go-title">DEFEATED</h1>
    <p id="go-sub"></p>
    <button class="btn" id="restart-btn">AGAIN</button>
  </div>
</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Audio — Web Audio API AudioBuffer for low latency ──
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function ensureAC(){ if(!ac) ac = new AC() }
function tone(f,d,v=.12,t='sine'){
  ensureAC();
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}

const AUDIO_BASE = 'https://raw.githubusercontent.com/dic1405/RhyHero/main/';
const audioBuffers = {};

async function loadAudioBuffer(name, url){
  try {
    const resp = await fetch(url);
    const arr = await resp.arrayBuffer();
    ensureAC();
    audioBuffers[name] = await ac.decodeAudioData(arr);
  } catch(e){ console.warn('Audio load failed:', name, e); }
}

function playBuffer(name, vol=1.0){
  ensureAC();
  const buf = audioBuffers[name];
  if(!buf) return;
  const src = ac.createBufferSource();
  const gain = ac.createGain();
  src.buffer = buf;
  gain.gain.value = Math.min(1, vol);
  src.connect(gain);
  gain.connect(ac.destination);
  src.start(0);
}

// Preload audio — will decode when AudioContext is available
function preloadAllAudio(){
  ensureAC();
  loadAudioBuffer('slot', AUDIO_BASE + 'Slot.wav');
  loadAudioBuffer('sword', AUDIO_BASE + 'Sword.wav');
  loadAudioBuffer('shield', AUDIO_BASE + 'Shield.wav');
  loadAudioBuffer('coin', AUDIO_BASE + 'Coin.wav');
  loadAudioBuffer('snare', AUDIO_BASE + 'Snare.wav');
}

const sfx = {
  slotLand(icon){
    if(icon==='sword') playBuffer('sword');
    else if(icon==='shield') playBuffer('shield');
    else if(icon==='gold') playBuffer('coin');
    else playBuffer('slot');
  },
  tick(){ playBuffer('snare', 0.5) },
  miss(){ tone(150,.2,.1,'sawtooth') },
  enemyHit(){ tone(100,.3,.15,'sawtooth') },
  triple(){ [0,60,120,180].forEach((d,i)=>setTimeout(()=>tone(800+i*200,.12,.12),d)) },
  nextEnemy(){ tone(600,.15,.12); setTimeout(()=>tone(800,.15,.12),120); setTimeout(()=>tone(1000,.2,.1),240) },
  defeat(){ [0,150,300].forEach((d,i)=>setTimeout(()=>tone(300-i*80,.4,.12,'sawtooth'),d)) },
};
function playMP3(name, vol){ playBuffer(name, vol); }

// ── Constants ──
const BEAT = 60/85; // seconds per full beat (85 BPM)
const PLAYER_MAX_HP = 300;
const BASE_ENEMY_HP = 100;
const BASE_ENEMY_DMG = 50;
const ICONS = ['sword','shield','gold'];
const ICON_SYMBOLS = { sword:'⚔', shield:'🛡', gold:'💰' };
const ICON_COLORS = { sword:'#ff4466', shield:'#4488ff', gold:'#ffaa00' };

// ── PNG Icons ──
const ICON_IMG_BASE = 'https://raw.githubusercontent.com/dic1405/RhyHero/main/';
const iconImages = {};
function loadIcon(name, file){
  const img = new Image();
  img.src = ICON_IMG_BASE + file;
  iconImages[name] = img;
}
loadIcon('sword', 'icon_sword.png');
loadIcon('shield', 'icon_shield.png');
loadIcon('gold', 'icon_coin.png');

function drawIcon(name, cx, cy, size){
  const img = iconImages[name];
  if(!img || !img.complete) return;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
  ctx.imageSmoothingEnabled = true;
}

// ── State ──
let playerHP = PLAYER_MAX_HP;
let playerShield = 0;
let gold = 0;
let enemyMaxHP = BASE_ENEMY_HP;
let enemyHP = BASE_ENEMY_HP;
let enemyNum = 1;
let currentEnemyDmg = BASE_ENEMY_DMG;

// Slot state
let slotIcons = [null,null,null]; // rolled icons
let slotBeats = [null,null,null]; // 'F', 'HH', or 'H' per icon
let slotPhase = 'idle';
let slotStep = 0;
let slotTimer = 0;
let slotRollAnim = 0;
let slotSchedule = []; // timed reveal events
let slotScheduleTime = 0;
let slotScheduleIdx = 0;
let iconDotVertices = []; // which glyph vertices are icon dots

// Glyph / rhythm state
let glyphVerts = [];
let glyphEdges = [];
let edgeDurs = [];
let dotSeg = 0, dotProg = 0;
let intHits = [];
let totalInts = 0;
let turnResults = [];
let phaseActive = false;
let showingResults = false;
let endPauseTimer = 0;

// Reward tracking
let baseValues = { sword:0, shield:0, gold:0 };
let tapValues = { sword:0, shield:0, gold:0 };
let allPerfectSoFar = true;
let isAllPerfect = false;

// FX
let particles = [];
let shake = 0;
let glow = 0;
let lastTime = 0;
let paused = false;

// BG
const bgP = [];
for(let i=0;i<15;i++) bgP.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00005,vy:(Math.random()-.5)*.00005,r:Math.random()*2+.5,a:Math.random()*.3});

// ── Canvas ──
const gameWrap = document.getElementById('game-wrap');
const DPR = Math.min(devicePixelRatio || 1, 2);
function resize(){
  const w = gameWrap.clientWidth;
  const h = gameWrap.clientHeight;
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize',resize); resize();
const W=()=>gameWrap.clientWidth, H=()=>gameWrap.clientHeight;

// ── Slot Machine Logic ──
// Results are pre-calculated so sounds can match the actual rhythm
const INIT_EDGES = 0; // v0 is the start point, not tappable

function showRollButton(){
  document.getElementById('roll-btn').style.display = 'block';
  document.getElementById('info').textContent = '';
  document.getElementById('result-display').textContent = '';
  document.getElementById('instructions').textContent = '';
  slotPhase = 'waiting';
  slotRevealedIcons = [false, false, false];
  slotBeatLines = [0, 0, 0];
  slotBeatFlash = [0, 0, 0];
  // Reset indicator values for fresh display
  baseValues = { sword:0, shield:0, gold:0 };
  tapValues = { sword:0, shield:0, gold:0 };
  isAllPerfect = false;
}

function startSlotPhase(){
  document.getElementById('roll-btn').style.display = 'none';
  slotIcons = [rollOneIcon(), rollOneIcon(), rollOneIcon()];
  slotBeats = [rollOneBeat(), rollOneBeat(), rollOneBeat()];
  slotRevealedIcons = [false, false, false];

  slotPhase = 'rolling';
  slotRollAnim = 0;
  phaseActive = false;
  showingResults = false;

  baseValues = { sword:0, shield:0, gold:0 };
  tapValues = { sword:0, shield:0, gold:0 };
  allPerfectSoFar = true;
  isAllPerfect = false;

  const isTriple = slotIcons[0]===slotIcons[1] && slotIcons[1]===slotIcons[2];
  if(isTriple){
    if(slotIcons[0]==='sword') baseValues.sword = 60;
    else if(slotIcons[0]==='shield') baseValues.shield = 60;
    else baseValues.gold = 6;
  } else {
    slotIcons.forEach(ic=>{
      if(ic==='sword') baseValues.sword += 10;
      else if(ic==='shield') baseValues.shield += 10;
      else baseValues.gold += 1;
    });
  }

  // Build rhythmic reveal schedule — matches exact play sequence
  // Structure: init(F) → icon0 dot → beat edges → icon1 dot → ...
  const previewEdges = [1]; // init
  let vp = 1;
  const tempIconVerts = [];
  for(let i=0; i<3; i++){
    tempIconVerts.push(vp);
    const bt = slotBeats[i];
    if(bt === 'F'){ previewEdges.push(1); vp += 1; }
    else if(bt === 'HH'){ previewEdges.push(0.5); previewEdges.push(0.5); vp += 2; }
    else { previewEdges.push(0.5); vp += 1; }
  }
  previewEdges.pop(); // remove trailing

  // Build schedule — tag snare events with owning slot for beat line tracking
  slotSchedule = [];
  slotSchedule.push({time: 0, action: 'init', slot: -1});
  slotBeatLines = [0, 0, 0];
  slotBeatFlash = [0, 0, 0];
  // Map intermediate vertices to owning slot (for HH)
  const vertToSlot = {};
  let vc = 1;
  for(let i=0; i<3; i++){
    if(slotBeats[i] === 'HH') vertToSlot[vc + 1] = i;
    if(slotBeats[i] === 'F') vc += 1;
    else if(slotBeats[i] === 'HH') vc += 2;
    else vc += 1;
  }
  let t = 0;
  for(let e=0; e<previewEdges.length; e++){
    t += previewEdges[e] * BEAT * 1000;
    const vertIdx = e + 1;
    const iconIdx = tempIconVerts.indexOf(vertIdx);
    if(iconIdx >= 0){
      slotSchedule.push({time: t, action: 'reveal', slot: iconIdx});
    } else {
      const owner = vertToSlot[vertIdx] !== undefined ? vertToSlot[vertIdx] : -1;
      slotSchedule.push({time: t, action: 'snare', slot: owner});
    }
  }
  slotScheduleTime = 0;
  slotScheduleIdx = 0;

  const label = document.getElementById('phase-label');
  label.textContent = '🎰 ROLL';
  label.style.color = '#ffaa00';
  label.style.textShadow = '0 0 30px #ffaa0066';
  label.style.opacity = 1;
  setTimeout(()=>{ label.style.opacity = 0 }, 600);

  document.getElementById('result-display').textContent = '';
  document.getElementById('instructions').textContent = '';
}

let slotRevealedIcons = [false,false,false];
let slotBeatLines = [0,0,0]; // how many beat lines visible per slot
let slotBeatFlash = [0,0,0]; // flash timer per slot

function rollOneIcon(){ return ICONS[Math.floor(Math.random()*3)] }
function rollOneBeat(){
  const r = Math.random();
  if(r < 0.4) return 'F';
  if(r < 0.75) return 'HH';
  return 'H';
}

function updateSlots(dt){
  if(slotPhase === 'idle' || slotPhase === 'waiting') return;
  slotRollAnim += dt * .006;

  if(slotPhase === 'rolling'){
    slotScheduleTime += dt;
    while(slotScheduleIdx < slotSchedule.length &&
          slotScheduleTime >= slotSchedule[slotScheduleIdx].time){
      const ev = slotSchedule[slotScheduleIdx];
      if(ev.action === 'reveal'){
        slotRevealedIcons[ev.slot] = true;
        sfx.slotLand(slotIcons[ev.slot]);
        // Show first beat line
        slotBeatLines[ev.slot] = 1;
        slotBeatFlash[ev.slot] = 300;
      } else if(ev.action === 'init'){
        playMP3('slot');
      } else if(ev.action === 'snare'){
        sfx.tick();
        // Show second beat line for HH slot
        if(ev.slot >= 0){
          slotBeatLines[ev.slot] = 2;
          slotBeatFlash[ev.slot] = 300;
        }
      }
      slotScheduleIdx++;
    }
    // Decay beat line flash
    for(let i=0;i<3;i++) if(slotBeatFlash[i]>0) slotBeatFlash[i]-=dt;
    if(slotScheduleIdx >= slotSchedule.length){
      slotPhase = 'show-result';
      slotTimer = BEAT * 800;
      const isTriple = slotIcons[0]===slotIcons[1] && slotIcons[1]===slotIcons[2];
      if(isTriple) sfx.triple();
    }
  } else if(slotPhase === 'show-result'){
    slotTimer -= dt;
    for(let i=0;i<3;i++) if(slotBeatFlash[i]>0) slotBeatFlash[i]-=dt;
    if(slotTimer <= 0){
      startGlyphPhase();
    }
  }
}

// ── Build Glyph from icon beat types ──
function buildRhythmFromSlots(){
  // Structure: init(F) → [icon0 dot] → icon0's beat edges → [icon1 dot] → ...
  // Icon dot is at the START of each icon's space
  // Beat type determines edges AFTER the icon dot
  const edges = [1]; // init beat — always 1 full beat leading to first icon
  iconDotVertices = [];
  let vertPos = 1; // v0=init, v1=first icon dot

  for(let i=0; i<3; i++){
    iconDotVertices.push(vertPos);
    const bt = slotBeats[i];
    if(bt === 'F'){
      edges.push(1);
      vertPos += 1;
    } else if(bt === 'HH'){
      edges.push(0.5);
      edges.push(0.5);
      vertPos += 2;
    } else { // H
      edges.push(0.5);
      vertPos += 1;
    }
  }
  edges.pop(); // remove trailing edge from last icon
  return edges;
}

function buildGlyph(edgeMults, cx, cy, radius){
  const n = edgeMults.length;
  const numVerts = n + 1;

  const totalWeight = edgeMults.reduce((a,b)=>a+b, 0);
  const hWeight = edgeMults.slice(INIT_EDGES).reduce((a,b)=>a+b, 0);

  // Pick shape type — 6 variants
  const shapeType = Math.floor(Math.random()*6);

  // Base angle for zigzag (from horizontal)
  const baseAngle = Math.PI / 3; // 60° — steep enough to avoid wide spread

  // Target 96px per beat, scale down to fit screen width
  const maxWidth = W() - 80;
  const estH = hWeight * Math.cos(baseAngle) * (shapeType === 2 ? 0.6 : 1);
  const maxUnit = estH > 0 ? maxWidth / estH : 96;
  const unitLen = Math.min(96, maxUnit);

  // Pre-compute angle for each edge
  const postInitCount = n - INIT_EDGES;
  const edgeAngles = [];
  for(let i = 0; i < n; i++){
    if(i < INIT_EDGES){
      edgeAngles.push(Math.PI / 2); // vertical down
    } else {
      const zi = i - INIT_EDGES;
      let a;
      if(shapeType === 0){
        // Zigzag down-first
        a = (zi%2===0) ? baseAngle : -baseAngle;
      }
      else if(shapeType === 1){
        // Zigzag up-first
        a = (zi%2===0) ? -baseAngle : baseAngle;
      }
      else if(shapeType === 2){
        // Snake — right then left
        const halfPoint = Math.floor(postInitCount / 2);
        const goingRight = zi < halfPoint;
        const dir = (zi%2===0) ? 1 : -1;
        const hDir = goingRight ? 1 : -1;
        a = Math.atan2(Math.sin(baseAngle) * dir, Math.cos(baseAngle) * hDir);
      }
      else if(shapeType === 3){
        // Staircase — alternating steep/shallow, same total length
        const steep = zi % 2 === 0;
        const ang = steep ? Math.PI/2.2 : Math.PI/5;
        const dir = (Math.floor(zi/2)%2===0) ? 1 : -1;
        a = ang * dir;
      }
      else if(shapeType === 4){
        // Cascade — steep with drift
        const dir = (zi%2===0) ? 1 : -1;
        a = (Math.PI/2.5) * dir;
      }
      else {
        // Wave — sine oscillation
        const phase = (zi / Math.max(1, postInitCount-1)) * Math.PI * 2;
        const dir = Math.sin(phase);
        a = baseAngle * dir;
      }
      edgeAngles.push(a);
    }
  }

  // Place vertices — each edge is exactly len pixels long
  const verts = [];
  let x = 0, y = 0;
  verts.push({x, y});

  for(let i = 0; i < n; i++){
    const len = edgeMults[i] * unitLen;
    const a = edgeAngles[i];
    // For init edges, go straight down; for others, horizontal + angle
    if(i < INIT_EDGES){
      y += len;
    } else {
      x += len * Math.cos(a);
      y += len * Math.sin(a);
    }
    verts.push({x, y});
  }

  // Center the shape on (cx, cy)
  const xs = verts.map(v=>v.x), ys = verts.map(v=>v.y);
  const offX = cx - (Math.min(...xs) + Math.max(...xs)) / 2;
  const offY = cy - (Math.min(...ys) + Math.max(...ys)) / 2;
  verts.forEach(v=>{ v.x += offX; v.y += offY; });

  // Dot speed = unitLen pixels per BEAT seconds (constant for all edges)
  // Edge duration = edgePixelLen / dotSpeed = (mult * unitLen) / (unitLen / BEAT) = mult * BEAT
  const edges = [];
  const durs = [];
  for(let i=0;i<n;i++){
    edges.push({from:i, to:i+1, beatMult:edgeMults[i]});
    durs.push(edgeMults[i] * BEAT);
  }
  return {verts, edges, durs};
}

function startGlyphPhase(){
  slotPhase = 'playing';

  // Build glyph from slot results
  const cx = W()/2, cy = H()*0.54;
  const radius = Math.min(W(),H()) * 0.15;
  const edgeMults = buildRhythmFromSlots();
  const g = buildGlyph(edgeMults, cx, cy, radius);
  glyphVerts = g.verts;
  glyphEdges = g.edges;
  edgeDurs = g.durs;
  totalInts = g.verts.length;

  dotSeg = 0;
  dotProg = 0;
  intHits = new Array(totalInts).fill(false);
  intHits[0] = true; // v0 init point, not tappable
  turnResults = [];
  phaseActive = true;
  endPauseTimer = 0;
  playMP3('slot'); // init beat — same as roll start

  // Reset tap values for this play (base values already set from slot roll)
  tapValues = { sword:0, shield:0, gold:0 };
  allPerfectSoFar = true;
  isAllPerfect = false;
}

// ── Dot & Hit ──
function getDotPos(){
  const e = glyphEdges[dotSeg];
  const f = glyphVerts[e.from], t = glyphVerts[e.to];
  return { x: f.x+(t.x-f.x)*dotProg, y: f.y+(t.y-f.y)*dotProg };
}

function evalHit(){
  const durMs = edgeDurs[dotSeg]*1000;
  const tEnd = (1-dotProg)*durMs;
  const tStart = dotProg*durMs;
  const nearEnd = tEnd < tStart;
  const td = Math.min(tEnd,tStart);
  if(td<55) return {rating:'PERFECT',nearEnd};
  if(td<120) return {rating:'GREAT',nearEnd};
  if(td<200) return {rating:'COOL',nearEnd};
  return {rating:'MISS',nearEnd};
}

function handleHit(){
  if(!phaseActive||showingResults) return;
  const r = evalHit();
  if(r.rating!=='MISS'){
    const idx = r.nearEnd ? glyphEdges[dotSeg].to : glyphEdges[dotSeg].from;
    if(idx === 0) return; // init vertex, not tappable
    if(!intHits[idx]){
      intHits[idx]=true;
      turnResults.push(r.rating);
      showFB(r.rating);
      spawnParticles(glyphVerts[idx].x, glyphVerts[idx].y, r.rating);
      applyTapImmediate(idx, r.rating);
      if(r.rating !== 'PERFECT') allPerfectSoFar = false;
    } else { showFB('MISS'); }
  } else {
    showFB('MISS'); sfx.miss(); turnResults.push('MISS');
    allPerfectSoFar = false;
  }
}

// ── Floating Animations ──
let floatingAnims = [];
let slashAnims = [];
let shieldAnims = [];

function applyTapImmediate(vertIdx, rating){
  const vx = glyphVerts[vertIdx].x;
  const vy = glyphVerts[vertIdx].y;

  const iconIdx = iconDotVertices.indexOf(vertIdx);
  if(iconIdx >= 0){
    // This is an icon dot
    const icon = slotIcons[iconIdx];
    const bonuses = {
      sword: { PERFECT:20, GREAT:15, COOL:12 },
      shield: { PERFECT:15, GREAT:12, COOL:11 },
      gold: { PERFECT:5, GREAT:2, COOL:1 }
    };
    const val = bonuses[icon][rating];
    tapValues[icon] += val;

    if(icon === 'sword'){
      enemyHP = Math.max(0, enemyHP - val);
      shake = Math.min(val / 3, 6);
      updateUI();
      slashAnims.push({ life:1, x: W()/2, y: H()*0.08 });
      playMP3('sword');
    } else if(icon === 'shield'){
      playerShield += val;
      updateUI();
      shieldAnims.push({ life:1, x: W()/2, y: H()*0.83 });
      playMP3('shield');
    } else if(icon === 'gold'){
      gold += val;
      updateUI();
      spawnCoinParticles(vx, vy, rating);
      playMP3('coin');
    }
  }
  else if(vertIdx > 0){
    // Beat/intermediate dot — add to all active icons
    const allBonus = { PERFECT:5, GREAT:2, COOL:1 };
    const val = allBonus[rating];
    if(baseValues.sword > 0){
      tapValues.sword += val;
      enemyHP = Math.max(0, enemyHP - val);
      shake = Math.min(val / 3, 4);
      slashAnims.push({ life:1, x: W()/2, y: H()*0.08 });
    }
    if(baseValues.shield > 0){
      tapValues.shield += val;
      playerShield += val;
      shieldAnims.push({ life:1, x: W()/2, y: H()*0.83 });
    }
    if(baseValues.gold > 0){
      tapValues.gold += val;
      gold += val;
      spawnCoinParticles(vx, vy, rating);
    }
    updateUI();
    sfx.tick(); // snare for beat dot tap
  }
}

function spawnCoinParticles(x, y, rating){
  const count = rating === 'PERFECT' ? 3 : rating === 'GREAT' ? 2 : 1;
  for(let i = 0; i < count; i++){
    floatingAnims.push({
      type: 'coin',
      x: x + (Math.random()-0.5) * 20,
      y: y,
      vx: (Math.random()-0.5) * 2,
      vy: -3 - Math.random() * 2,
      life: 1,
      size: 14 + Math.random() * 4
    });
  }
}

function updateFloatingAnims(dt){
  const decay = dt / 800;
  floatingAnims = floatingAnims.filter(a => a.life > 0);
  floatingAnims.forEach(a => {
    a.x += a.vx; a.y += a.vy; a.vy += 0.08; a.life -= decay;
  });
  slashAnims = slashAnims.filter(a => a.life > 0);
  slashAnims.forEach(a => { a.life -= dt / 300; });
  shieldAnims = shieldAnims.filter(a => a.life > 0);
  shieldAnims.forEach(a => { a.life -= dt / 500; });
}

function drawFloatingAnims(){
  // Coin particles
  floatingAnims.forEach(a => {
    ctx.globalAlpha = Math.max(0, a.life);
    drawIcon('gold', a.x, a.y, a.size);
    ctx.globalAlpha = 1;
  });
  // Slash anims on enemy
  slashAnims.forEach(a => {
    const t = 1 - a.life;
    ctx.save(); ctx.translate(a.x, a.y);
    ctx.globalAlpha = Math.max(0, a.life);
    ctx.strokeStyle = '#ff4466'; ctx.lineWidth = 3 * a.life;
    ctx.beginPath();
    const len = 25 + t * 15;
    ctx.moveTo(-len, -len*0.6); ctx.lineTo(len, len*0.6); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(len*0.8, -len*0.5); ctx.lineTo(-len*0.8, len*0.5); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  });
  // Shield anims on player
  shieldAnims.forEach(a => {
    const t = 1 - a.life;
    const slideY = a.y - t * 30;
    ctx.globalAlpha = Math.max(0, a.life);
    drawIcon('shield', a.x, slideY, 24);
    ctx.globalAlpha = 1;
  });
}

function showFB(r){
  const fb=document.getElementById('hit-fb');
  const c={PERFECT:'#00ffaa',GREAT:'#44aaff',COOL:'#ffaa00',MISS:'#ff3366'};
  fb.textContent=r; fb.style.color=c[r];
  fb.style.textShadow=`0 0 20px ${c[r]}88`;
  fb.style.opacity=1; fb.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(()=>{fb.style.opacity=0;fb.style.transform='translate(-50%,-50%) scale(1)'},300);
}

function spawnParticles(x,y,rating){
  const c={PERFECT:'#00ffaa',GREAT:'#44aaff',COOL:'#ffaa00',MISS:'#ff3366'};
  const n=rating==='PERFECT'?18:rating==='GREAT'?12:6;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.015+Math.random()*.015,color:c[rating],size:Math.random()*4+2});
  }
}

// ── Finish Playing Phase ──

function finishPlaying(){
  phaseActive = false;
  showingResults = true;

  // Check all perfect
  const tappable = totalInts - 1; // v0 is not tappable
  const tapped = turnResults.filter(r=>r!=='MISS').length;
  if(tapped < tappable) allPerfectSoFar = false;
  isAllPerfect = allPerfectSoFar;

  // All perfect bonus: apply x1.5 retroactively
  if(isAllPerfect){
    const bonusSword = Math.round((baseValues.sword + tapValues.sword) * 0.5);
    const bonusShield = Math.round((baseValues.shield + tapValues.shield) * 0.5);
    const bonusGold = Math.round((baseValues.gold + tapValues.gold) * 0.5);
    if(bonusSword > 0){ enemyHP = Math.max(0, enemyHP - bonusSword); tapValues.sword += bonusSword; }
    if(bonusShield > 0){ playerShield += bonusShield; tapValues.shield += bonusShield; }
    if(bonusGold > 0){ gold += bonusGold; tapValues.gold += bonusGold; }
    updateUI();
    sfx.triple();
    document.getElementById('result-display').textContent = '✨ ALL PERFECT ×1.5!';
    document.getElementById('result-display').style.color = '#ffaa00';
  }

  if(enemyHP <= 0){
    setTimeout(()=>advanceEnemy(), 1200);
    return;
  }

  setTimeout(()=>{
    showingResults = false;
    document.getElementById('result-display').textContent = '';
    enemyTurn();
  }, isAllPerfect ? 1500 : 800);
}

// ── Enemy Turn ──
let enemyTurnPhase = ''; // 'attack' or 'react'
let enemyTurnTimer = 0;
let enemyTurnActive = false;
let enemyTurnAbsorbed = 0;
let enemyTurnDmg = 0;

function enemyTurn(){
  showingResults = false;
  slotPhase = 'enemy-turn';

  document.getElementById('result-display').textContent = '';
  document.getElementById('info').textContent = '';

  // Pre-calculate damage
  enemyTurnDmg = currentEnemyDmg;
  enemyTurnAbsorbed = 0;
  if(playerShield > 0){
    enemyTurnAbsorbed = Math.min(playerShield, enemyTurnDmg);
    enemyTurnDmg -= enemyTurnAbsorbed;
  }

  // Beat 1: show attack
  enemyTurnPhase = 'attack';
  enemyTurnTimer = BEAT * 1000;
  enemyTurnActive = true;
  sfx.enemyHit();
}

function updateEnemyTurn(dt){
  if(!enemyTurnActive) return;
  enemyTurnTimer -= dt;
  if(enemyTurnTimer > 0) return;

  if(enemyTurnPhase === 'attack'){
    // Beat 2: apply damage
    enemyTurnPhase = 'react';
    enemyTurnTimer = BEAT * 1000;

    // Apply damage
    if(enemyTurnAbsorbed > 0) playerShield -= enemyTurnAbsorbed;
    if(enemyTurnDmg > 0){
      playerHP = Math.max(0, playerHP - enemyTurnDmg);
      shake = 6;
    }
    sfx.enemyHit();
    updateUI();
  } else {
    // Done
    enemyTurnActive = false;

    if(playerHP <= 0){
      setTimeout(()=>endGame(), 600);
      return;
    }

    setTimeout(()=>showRollButton(), 300);
  }
}

function drawEnemyTurn(){
  if(!enemyTurnActive) return;

  const cx = W()/2, cy = H()/2;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, cy - 50, W(), 100);

  if(enemyTurnPhase === 'attack'){
    drawIcon('sword', cx, cy - 8, 36);
    ctx.font = '18px Orbitron';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff3366';
    ctx.fillText(`ATK ${currentEnemyDmg}`, cx, cy + 30);
  } else {
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    if(enemyTurnAbsorbed > 0 && enemyTurnDmg > 0){
      drawIcon('shield', cx - 16, cy - 8, 28);
      ctx.font = '15px Orbitron';
      ctx.fillStyle = '#ff6666';
      ctx.fillText(`Shield -${enemyTurnAbsorbed}  HP -${enemyTurnDmg}`, cx, cy + 30);
    } else if(enemyTurnAbsorbed > 0){
      drawIcon('shield', cx, cy - 8, 36);
      ctx.font = '16px Orbitron';
      ctx.fillStyle = '#4488ff';
      ctx.fillText(`Shield absorbed ${enemyTurnAbsorbed}!`, cx, cy + 30);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillText('💔', cx, cy - 8);
      ctx.font = '16px Orbitron';
      ctx.fillStyle = '#ff3366';
      ctx.fillText(`-${enemyTurnDmg} HP`, cx, cy + 30);
    }

    // Flash
    const flash = Math.sin(glow * 15) * 0.3 + 0.7;
    ctx.globalAlpha = flash * 0.15;
    ctx.fillStyle = '#ff3366';
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Enemy Progression ──
function advanceEnemy(){
  enemyNum++;
  enemyMaxHP = BASE_ENEMY_HP + (enemyNum-1)*50;
  enemyHP = enemyMaxHP;
  currentEnemyDmg = BASE_ENEMY_DMG + (enemyNum-1)*10;
  playerHP = PLAYER_MAX_HP;
  playerShield = 0;
  updateUI();

  document.getElementById('e-label').textContent = `ENEMY ${enemyNum}`;
  document.getElementById('e-atk').textContent = `ATK: ${currentEnemyDmg}`;
  document.getElementById('result-display').textContent = '';

  sfx.nextEnemy();
  const label = document.getElementById('phase-label');
  label.textContent = `ENEMY ${enemyNum}`;
  label.style.color = '#ff3366';
  label.style.textShadow = '0 0 30px #ff336666';
  label.style.opacity = 1;
  document.getElementById('info').textContent = `HP: ${enemyMaxHP}`;

  setTimeout(()=>{
    label.style.opacity = 0;
    setTimeout(()=>showRollButton(), 500);
  }, 1500);
}

function endGame(){
  document.getElementById('roll-btn').style.display='none';
  const s = document.getElementById('gameover-screen');
  s.style.display='flex';
  document.getElementById('go-title').textContent='DEFEATED';
  document.getElementById('go-title').style.color='#ff3366';
  document.getElementById('go-title').style.textShadow='0 0 40px #ff336666';
  document.getElementById('go-sub').textContent=`Fell at enemy ${enemyNum}. Gold: ${gold}. Enemies defeated: ${enemyNum-1}`;
  sfx.defeat();
  phaseActive=false; slotPhase='idle';
}

function resetGame(){
  playerHP=PLAYER_MAX_HP; playerShield=0; gold=0;
  enemyNum=1; enemyMaxHP=BASE_ENEMY_HP; enemyHP=BASE_ENEMY_HP;
  currentEnemyDmg=BASE_ENEMY_DMG;
  slotPhase='idle'; phaseActive=false; showingResults=false;
  paused=false; document.getElementById('pause-screen').style.display='none';
  document.getElementById('pause-btn').textContent='⏸';
  particles=[]; shake=0;
  floatingAnims=[]; slashAnims=[]; shieldAnims=[];
  updateUI();
  document.getElementById('gameover-screen').style.display='none';
  document.getElementById('result-display').textContent='';
  document.getElementById('e-label').textContent='ENEMY 1';
  document.getElementById('e-atk').textContent=`ATK: ${BASE_ENEMY_DMG}`;

}

function updateUI(){
  document.getElementById('p-hp-fill').style.width=(playerHP/PLAYER_MAX_HP*100)+'%';
  document.getElementById('p-hp-txt').textContent=`HP ${playerHP}/${PLAYER_MAX_HP}`;

  document.getElementById('p-shield-fill').style.width=Math.min(100,playerShield/maxShieldDisplay*100)+'%';
  document.getElementById('p-shield-txt').textContent=playerShield>0?`🛡 ${playerShield}`:'';
  document.getElementById('e-hp-fill').style.width=(enemyHP/enemyMaxHP*100)+'%';
  document.getElementById('e-hp-txt').textContent=`${enemyHP}/${enemyMaxHP}`;
  document.getElementById('gold-display').textContent=`💰 ${gold}`;
}

// ── Input ──
function togglePause(){
  if(slotPhase==='idle') return; // don't pause on start/gameover screens
  paused = !paused;
  document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';

});

document.getElementById('resume-btn').addEventListener('click', togglePause);

  startSlotPhase();
});

// ── Drawing ──
function drawBG(){
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,W(),H());
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
    ctx.beginPath();ctx.arc(p.x*W(),p.y*H(),p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,140,180,${p.a})`;ctx.fill();
  });
}

function drawSlots(){
  if(slotPhase==='idle') return;

  const cx=W()/2, sy=H()*0.24;
  const slotW=56, slotH=64, gap=10;
  const totalW = slotW*3 + gap*2;
  const startX = cx - totalW/2;

  // Draw icon slots
  for(let i=0;i<3;i++){
    const x = startX + i*(slotW+gap);
    const y = sy - slotH/2;
    const revealed = slotRevealedIcons[i];

    ctx.strokeStyle = revealed ? ICON_COLORS[slotIcons[i]]+'88' : '#ffffff22';
    ctx.lineWidth = revealed ? 2 : 1;
    ctx.strokeRect(x, y, slotW, slotH);

    ctx.fillStyle = revealed ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(x, y, slotW, slotH);

    if(revealed){
      drawIcon(slotIcons[i], x+slotW/2, y+slotH/2, 28);
    } else if(slotPhase==='rolling' && !slotRevealedIcons[i]){
      const spinIcon = ICONS[Math.floor(slotRollAnim*8)%3];
      ctx.globalAlpha = 0.4;
      drawIcon(spinIcon, x+slotW/2, y+slotH/2, 28);
      ctx.globalAlpha = 1;
    }
  }

  // Beat indicators below each slot — progressive reveal with flash
  const beatY = sy + slotH/2 + 8;
  const lineH = 3;
  const linePad = 4;
  for(let i=0; i<3; i++){
    if(slotBeatLines[i] <= 0) continue;
    const x = startX + i*(slotW+gap);
    const bt = slotBeats[i];
    const flash = slotBeatFlash[i] > 0 ? 0.5 + (slotBeatFlash[i]/300)*0.5 : 0.3;

    if(bt === 'F'){
      // Full line
      ctx.fillStyle = `rgba(255,255,255,${flash})`;
      ctx.fillRect(x, beatY, slotW, lineH);
    } else if(bt === 'HH'){
      const halfW = (slotW - linePad) / 2;
      // First half line
      const flash1 = slotBeatLines[i] >= 1 ? (slotBeatLines[i] === 1 && slotBeatFlash[i] > 0 ? 0.5 + (slotBeatFlash[i]/300)*0.5 : 0.3) : 0;
      if(slotBeatLines[i] >= 1){
        ctx.fillStyle = `rgba(255,255,255,${flash1})`;
        ctx.fillRect(x, beatY, halfW, lineH);
      }
      // Second half line
      if(slotBeatLines[i] >= 2){
        const flash2 = slotBeatFlash[i] > 0 ? 0.5 + (slotBeatFlash[i]/300)*0.5 : 0.3;
        ctx.fillStyle = `rgba(255,255,255,${flash2})`;
        ctx.fillRect(x + halfW + linePad, beatY, halfW, lineH);
      }
    } else {
      // Single half line centered
      const halfW = (slotW - linePad) / 2;
      ctx.fillStyle = `rgba(255,255,255,${flash})`;
      ctx.fillRect(x + (slotW - halfW) / 2, beatY, halfW, lineH);
    }
  }
}

function drawIndicators(){
  // Always show during active gameplay
  if(slotPhase === 'idle') return;

  const cx = W()/2;
  const y = H()*0.37;

  // Always show all 3 icons — values start at 0, update when slots land
  const entries = [
    { iconName:'sword', base:baseValues.sword, tap:tapValues.sword, color:ICON_COLORS.sword },
    { iconName:'shield', base:baseValues.shield, tap:tapValues.shield, color:ICON_COLORS.shield },
    { iconName:'gold', base:baseValues.gold, tap:tapValues.gold, color:ICON_COLORS.gold },
  ];

  const gap = Math.min(140, W()*0.35);
  const startX = cx - (entries.length - 1) * gap / 2;

  entries.forEach((e, i)=>{
    const x = startX + i * gap;
    const hasValue = e.base > 0 || e.tap > 0;

    // Icon
    ctx.globalAlpha = hasValue ? 1 : 0.3;
    drawIcon(e.iconName, x - 45, y, 22);

    // Base value
    ctx.font = '16px Orbitron';
    ctx.textAlign = 'left';
    ctx.fillStyle = hasValue ? e.color + 'cc' : '#ffffff22';
    ctx.fillText(`${e.base}`, x - 28, y);

    // + tap value
    ctx.font = '14px Orbitron';
    ctx.fillStyle = e.tap > 0 ? '#00ffaacc' : '#ffffff22';
    ctx.fillText(`+${e.tap}`, x + 2, y);
    ctx.globalAlpha = 1;

    // x1.5 multiplier (show during results if all perfect)
    if(isAllPerfect && showingResults){
      ctx.fillStyle = '#ffaa00';
      ctx.font = '12px Orbitron';
      ctx.fillText('×1.5', x + 30, y);
    }
  });
}

function drawGlyph(){
  if(slotPhase!=='playing' || (!phaseActive && !showingResults)) return;

  const col = '#00ffaa';
  const dim = 'rgba(0,255,170,0.15)';
  const mid = 'rgba(0,255,170,0.4)';

  // Edges
  glyphEdges.forEach((edge,ei)=>{
    const f=glyphVerts[edge.from], t=glyphVerts[edge.to];
    const isInit = ei < INIT_EDGES;
    ctx.strokeStyle = isInit ? 'rgba(255,255,255,0.06)' : dim;
    ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();
    const lw = edge.beatMult<=.5 ? 0.75 : 1.5;
    ctx.strokeStyle = isInit ? 'rgba(255,255,255,0.15)' : mid;
    ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();
  });

  // Vertices — circles scale down to dot size at perfect timing
  const maxR = 12;
  const minR = 7.5; // matches dot core size
  const animWindow = BEAT * 1000; // shrink over 1 beat approach

  glyphVerts.forEach((v,i)=>{
    const hit = intHits[i];
    const isInit = i <= INIT_EDGES;

    // Calculate time distance to this vertex for shrink animation
    let timeDist = Infinity;
    if(phaseActive && !hit && !isInit){
      if(dotSeg < glyphEdges.length){
        if(i === glyphEdges[dotSeg].from){
          timeDist = dotProg * edgeDurs[dotSeg] * 1000;
        } else if(i === glyphEdges[dotSeg].to){
          timeDist = (1 - dotProg) * edgeDurs[dotSeg] * 1000;
        }
        // Also check next edge's end vertex for upcoming awareness
        else if(dotSeg + 1 < glyphEdges.length && i === glyphEdges[dotSeg+1].to){
          const timeToEndOfCurrent = (1 - dotProg) * edgeDurs[dotSeg] * 1000;
          timeDist = timeToEndOfCurrent + edgeDurs[dotSeg+1] * 1000;
        }
      }
    }

    // Scale radius: far = maxR, at vertex = minR
    let r;
    if(timeDist <= animWindow && timeDist !== Infinity){
      const t = Math.max(0, timeDist / animWindow);
      r = minR + (maxR - minR) * t;
    } else {
      r = hit ? maxR * 0.8 : maxR;
    }

    // Outer glow
    ctx.beginPath();ctx.arc(v.x,v.y,r+4,0,Math.PI*2);
    ctx.fillStyle = hit ? 'rgba(255,255,255,0.08)' : col+'11';ctx.fill();

    // Main circle
    ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);
    if(isInit){
      ctx.strokeStyle = '#ffffff33';
      ctx.lineWidth = 1;
    } else {
      const proximity = timeDist <= animWindow ? 1 - timeDist/animWindow : 0;
      const alpha = hit ? '44' : proximity > 0.5 ? 'ff' : proximity > 0 ? 'bb' : '';
      ctx.strokeStyle = hit ? '#ffffff44' : (alpha ? '#ffffff' + alpha : col);
      ctx.lineWidth = hit ? 1.5 : 1.5 + proximity * 1.5;
    }
    ctx.stroke();

    if(isInit && i === 0){
      // "PLAY" label at init dot
      ctx.font = '10px Orbitron';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#00ffaa88';
      ctx.fillText('PLAY', v.x, v.y);
    } else if(hit && !isInit){
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='#ffffff88';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(v.x-4,v.y);ctx.lineTo(v.x-1,v.y+3);ctx.lineTo(v.x+5,v.y-3);
      ctx.stroke();
    }
  });

  // Dot
  if(phaseActive){
    const p = getDotPos();
    const px = p.x, py = p.y;

    ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,170,0.15)';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,7.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  }
}

function drawEnemy(){
  const cx=W()/2,cy=H()*0.08;
  const pulse=Math.sin(glow*2)*3;
  const sz=25+pulse;
  const hpR=enemyHP/enemyMaxHP;

  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,0,sz+10,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,51,102,${.08*hpR})`;ctx.fill();

  ctx.beginPath();ctx.arc(0,-4,sz*.8,0,Math.PI*2);
  ctx.fillStyle='rgba(40,15,25,.9)';ctx.fill();
  ctx.strokeStyle=`rgba(255,51,102,${.4+.3*hpR})`;ctx.lineWidth=2;ctx.stroke();

  const ey=.5+Math.sin(glow*4)*.2;
  ctx.fillStyle=`rgba(255,51,102,${ey})`;
  ctx.beginPath();ctx.arc(-8,-6,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-6,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-8,-6,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-6,1.5,0,Math.PI*2);ctx.fill();

  if(enemyNum>1){
    ctx.font='9px Orbitron';ctx.fillStyle='#ff336688';
    ctx.textAlign='center';ctx.fillText(`LV ${enemyNum}`,0,sz*.8+14);
  }
  ctx.restore();
}

function drawPlayer(){
  const cx=W()/2,cy=H()*.83;
  const pulse=Math.sin(glow*2.5)*2;
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,0,25,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,170,.06)';ctx.fill();
  ctx.strokeStyle='#00ffaa88';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,-12,8+pulse*.3,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0,-4);ctx.lineTo(0,10);
  ctx.moveTo(-10,2);ctx.lineTo(10,2);
  ctx.moveTo(0,10);ctx.lineTo(-8,20);
  ctx.moveTo(0,10);ctx.lineTo(8,20);
  ctx.stroke();ctx.restore();
}

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=p.decay;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.size*p.life),0,Math.PI*2);
    const a=Math.max(0,Math.min(255,Math.floor(p.life*255)));
    ctx.fillStyle=p.color+a.toString(16).padStart(2,'0');ctx.fill();
  });
}

// ── Main Loop ──
function update(ts){
  const dt = ts - lastTime;
  lastTime = ts;
  glow += dt*.001;

  if(!paused){
    // Slot machine update
    updateSlots(dt);

    // Dot movement
    if(phaseActive && edgeDurs.length>0 && endPauseTimer <= 0){
      const dur = edgeDurs[dotSeg];
      dotProg += (1/dur)*(dt/1000);
      if(dotProg >= 1){
        dotProg -= 1;
        dotSeg++;
        // Play sound only for missed vertices — tapped ones already played via applyTapImmediate
        if(!intHits[dotSeg]){
          const crossedIconIdx = iconDotVertices.indexOf(dotSeg);
          if(crossedIconIdx >= 0){
            sfx.slotLand(slotIcons[crossedIconIdx]);
          } else {
            sfx.tick();
          }
        }
        if(dotSeg >= glyphEdges.length){
          dotSeg = glyphEdges.length-1;
          dotProg = 1;
          // Start 1-beat pause at the end
          endPauseTimer = BEAT * 1000;
        }
      }
    }

    // End pause — wait 1 beat at final vertex then finish
    if(endPauseTimer > 0){
      endPauseTimer -= dt;
      if(endPauseTimer <= 0){
        for(let i=0;i<totalInts;i++){
          if(!intHits[i]) turnResults.push('MISS');
        }
        finishPlaying();
      }
    }

    // Floating animations (slash, shield, coins)
    updateFloatingAnims(dt);

    // Enemy turn animation
    updateEnemyTurn(dt);

    shake *= .9;
    if(shake<.1) shake=0;
  }

  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);

  drawBG();
  drawEnemy();
  drawPlayer();
  drawSlots();
  drawIndicators();
  drawGlyph();
  drawParticles();

  ctx.restore();
  drawFloatingAnims();
  drawEnemyTurn();
  requestAnimationFrame(update);
}
requestAnimationFrame(update);
</script>
